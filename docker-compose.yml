services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_directory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/agent_directory
      ADMIN_TOKEN: change-this-in-production
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8000
      FRONTEND_URL: http://localhost:5173
    ports:
      - '8000:8000'

  # Frontend: run `cd frontend && npm run dev` for local development.
  # Docker build for frontend will be added in Phase 6 (Deploy).
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - '5173:5173'
  #   depends_on:
  #     - backend

volumes:
  pgdata:
